<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Video Uploader & Compressor</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: auto; border: 1px solid #333; padding: 20px; border-radius: 10px; background: #1e1e1e; }
        input { margin: 20px 0; }
        #status { color: #ffca28; margin: 10px 0; font-weight: bold; }
        video { width: 100%; margin-top: 20px; display: none; border: 1px solid #444; border-radius: 8px; }
        .result-box { display: none; margin-top: 20px; padding: 15px; background: #2c2c2c; border-radius: 5px; }
        .url-display { color: #4db6ac; word-break: break-all; font-family: monospace; display: block; margin: 10px 0; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>Video Uploader & Compressor</h1>
    <p>100MBを超える動画は自動で圧縮されます</p>
    
    <input type="file" id="uploader" accept="video/*">
    <div id="status"></div>
    
    <video id="output-video" controls></video>

    <div id="result-box" class="result-box">
        <p>✅ 共有URLを発行しました（2週間有効）:</p>
        <span id="share-url" class="url-display"></span>
        <button onclick="copyURL()">URLをコピー</button>
    </div>
</div>

<script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: false });

    const uploader = document.getElementById('uploader');
    const status = document.getElementById('status');
    const videoTag = document.getElementById('output-video');
    const resultBox = document.getElementById('result-box');
    const shareUrl = document.getElementById('share-url');

    uploader.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        status.innerText = "処理中...";
        resultBox.style.display = "none";
        
        let fileToUpload = file;
        const MAX_SIZE = 100 * 1024 * 1024;

        // 圧縮が必要な場合
        if (file.size > MAX_SIZE) {
            status.innerText = "動画を圧縮しています。少々お待ちください...";
            if (!ffmpeg.isLoaded()) await ffmpeg.load();
            ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));
            await ffmpeg.run('-i', 'input.mp4', '-vcodec', 'libx264', '-crf', '28', '-fs', '98M', 'output.mp4');
            const data = ffmpeg.FS('readFile', 'output.mp4');
            fileToUpload = new File([data.buffer], "compressed.mp4", { type: "video/mp4" });
        }

        // 外部ストレージ(file.io)にアップロードしてURL発行
        status.innerText = "URLを発行しています...";
        const formData = new FormData();
        formData.append('file', fileToUpload);
        // expires=2w で2週間保持（24h設定はAPI有料枠のため2週間で代用、または1回DLで消去設定）
        
        try {
            const response = await fetch('https://file.io/?expires=2w', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();

            if (result.success) {
                status.innerText = "完了！";
                videoTag.src = URL.createObjectURL(fileToUpload);
                videoTag.style.display = "block";
                
                shareUrl.innerText = result.link;
                resultBox.style.display = "block";
            } else {
                status.innerText = "アップロードに失敗しました。";
            }
        } catch (err) {
            status.innerText = "エラーが発生しました。";
            console.error(err);
        }
    });

    function copyURL() {
        const text = shareUrl.innerText;
        navigator.clipboard.writeText(text);
        alert("コピーしました！");
    }
</script>

</body>
</html>
